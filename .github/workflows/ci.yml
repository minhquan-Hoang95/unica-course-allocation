name: CI Basic

on:
  push:
    branches: [main, dev] # trigger on push to main and dev
  pull_request:
    branches: [main, dev] # trigger on pull request to main and dev
  workflow_dispatch: # allows manual trigger from GitHub UI

  schedule: # Schedule workflow to run at 6:00 UTC on Monday
    - cron: '0 6 * * 1'

# Permissions are needed to read privileged
permissions:
  contents: read
  # This permission is required when uploading sarifs to any repository at GitHub
  security-events: write
  # These permissions are only required when uploading sarifs to private and internal repositories at GitHub
  actions: read

# Annule les runs obsolètes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  # ================= Continuous Integration =================

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # 11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # 0080882f6c36860b6ba35c610c98ce87d4e2f26f
        with:
          egress-policy: audit

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065     # v5
        with:
          python-version: '3.12'
          cache: 'pip' # caching pip dependencies
      - name: Update pip
        run: python3 -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3
      - run: ruff check .
      - run: ruff format --check

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # 11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # 0080882f6c36860b6ba35c610c98ce87d4e2f26f
        with:
          egress-policy: audit
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065     # v5
        with:
          python-version: '3.12'
          cache: 'pip' # caching pip dependencies
      - name: Update pip
        run: python3 -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  # ================= Security Gates =================
  # Gate 1 : Secrets (block immediately)
  secrets:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # 0080882f6c36860b6ba35c610c98ce87d4e2f26f
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # 11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0 # Fetch all history for all tags and branches

      - name: Detect secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Gate 2 : SAST (block sur critical / high)
  sast:
    name: Analyse de sécurité
    runs-on: ubuntu-latest
    needs: [lint, test]
    container:
      image: returntocorp/semgrep

    steps:
      # Récupérer le code
      - name: Checkout du code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # 11bd71901bbe5b1630ceea73d27597364c9af683

      # Lancer le scan
      - name: Scan Semgrep
        run: |
          semgrep --config=p/security-audit --severity ERROR \
                  --error \
                  --json \
                  -o semgrep-results.json \
                  .

      # Sauvegarder les résultats même si le scan échoue
      - name: Upload des résultats
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

# Gate 3: SCA (Dependency Analysis)
  sca:
    name: SCA (Trivy)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f
        with:
          egress-policy: audit

      - name: Run Trivy (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH,MEDIUM'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Fail on critical vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db

  # Gate final : check if all previous gates passed
  security-pass:
    needs: [secrets, sast, sca]
    runs-on: ubuntu-latest
    if: always() #
    steps:
      - name: Check if all previous gates passed
        run: |
          for result in "${{ needs.secrets.result }}" "${{ needs.sast.result }}" "${{ needs.sca.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "One or more security gates failed: $result"
              exit 1
            fi
          done
          echo "All security gates passed"

# =========== Continuous Delivery  ==========
